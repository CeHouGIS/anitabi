<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二次元圣地巡礼 · 空间分析 Demo</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--panel:#1a1d27;--border:#2a2d3e;
  --accent:#7c6ef2;--text:#e2e4ef;--muted:#6b7094;
  --anime1:#f97316;--anime2:#22d3ee;--anime3:#a3e635;
}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── header ── */
header{display:flex;align-items:center;gap:1rem;padding:.75rem 1.25rem;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-size:1.1rem;font-weight:700;letter-spacing:.05em}
header h1 span{color:var(--accent)}
.badge{padding:.2rem .55rem;border-radius:.3rem;font-size:.72rem;font-weight:600;background:#2a2d3e;color:var(--muted)}
header .spacer{flex:1}
header a{color:var(--muted);font-size:.8rem;text-decoration:none}
header a:hover{color:var(--text)}

/* ── main layout ── */
main{display:flex;flex:1;overflow:hidden}
#map{flex:1;z-index:1}

/* ── sidebar ── */
aside{width:340px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}

/* ── legend ── */
.legend{padding:.9rem 1rem .7rem;border-bottom:1px solid var(--border)}
.legend h3{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}
.legend-items{display:flex;flex-direction:column;gap:.35rem}
.legend-item{display:flex;align-items:center;gap:.5rem;font-size:.82rem}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

/* ── stats ── */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;padding:.9rem 1rem;border-bottom:1px solid var(--border)}
.stat{background:#12151f;border-radius:.5rem;padding:.6rem .7rem;text-align:center}
.stat .val{font-size:1.35rem;font-weight:700;color:var(--accent);line-height:1.1}
.stat .lbl{font-size:.65rem;color:var(--muted);margin-top:.2rem}

/* ── chart area ── */
.chart-wrap{padding:.9rem 1rem;border-bottom:1px solid var(--border)}
.chart-wrap h3{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}

/* ── info panel ── */
.info-panel{flex:1;overflow-y:auto;padding:.9rem 1rem}
.info-panel h3{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
#site-info{font-size:.82rem;color:var(--muted)}
.info-card{background:#12151f;border-radius:.5rem;padding:.75rem;margin-bottom:.5rem}
.info-card .card-title{color:var(--text);font-weight:600;margin-bottom:.4rem;font-size:.9rem}
.info-card table{width:100%;border-collapse:collapse}
.info-card td{padding:.2rem .15rem;vertical-align:top}
.info-card td:first-child{color:var(--muted);width:80px;font-size:.75rem}
.info-card td:last-child{font-size:.78rem}
.tag{display:inline-block;padding:.1rem .4rem;border-radius:.25rem;font-size:.68rem;font-weight:600;background:#2a2d3e;color:var(--accent)}

/* ── place type tag colors ── */
.pt-shrine{background:#fde68a22;color:#fde68a}
.pt-bridge{background:#93c5fd22;color:#93c5fd}
.pt-temple{background:#c4b5fd22;color:#c4b5fd}
.pt-station{background:#6ee7b722;color:#6ee7b7}
.pt-park{background:#a3e63522;color:#a3e635}
.pt-hill{background:#fb923c22;color:#fb923c}
.pt-river{background:#38bdf822;color:#38bdf8}
.pt-school{background:#f9a8d422;color:#f9a8d4}
.pt-shopping{background:#fbbf2422;color:#fbbf24}
.pt-other{background:#6b709422;color:#6b7094}

/* ── scrollbar ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── leaflet dark overrides ── */
.leaflet-container{background:#1a2031}
.leaflet-popup-content-wrapper{background:#1a1d27;color:#e2e4ef;border:1px solid #2a2d3e;border-radius:.5rem;box-shadow:0 4px 20px #0006;font-size:.82rem}
.leaflet-popup-tip{background:#1a1d27}
.leaflet-popup-content{margin:.7rem .9rem}
.leaflet-popup-content b{color:#a5b4fc;display:block;margin-bottom:.3rem;font-size:.9rem}
.leaflet-popup-content small{color:var(--muted)}

/* ── responsive ── */
@media(max-width:700px){
  aside{display:none}
}
</style>
</head>
<body>

<header>
  <h1>二次元圣地巡礼 <span>·</span> 空间分析 Demo</h1>
  <span class="badge">Pilot</span>
  <div class="spacer"></div>
  <a href="https://github.com/CeHouGIS/anitabi" target="_blank">GitHub →</a>
</header>

<main>
  <div id="map"></div>

  <aside>
    <!-- 图例 -->
    <div class="legend">
      <h3>动画作品</h3>
      <div class="legend-items">
        <div class="legend-item"><div class="dot" style="background:var(--anime1)"></div><span>冰菓（高山市 · 岐阜）</span></div>
        <div class="legend-item"><div class="dot" style="background:var(--anime2)"></div><span>未闻花名（秩父市 · 埼玉）</span></div>
        <div class="legend-item"><div class="dot" style="background:var(--anime3)"></div><span>摇曳露营△（山梨·长野）</span></div>
        <div class="legend-item"><div class="dot" style="background:#444;border:1px solid #666"></div><span>随机对照点</span></div>
      </div>
    </div>

    <!-- 统计 -->
    <div class="stats">
      <div class="stat"><div class="val">90</div><div class="lbl">圣地点位</div></div>
      <div class="stat"><div class="val">270</div><div class="lbl">对照点位</div></div>
      <div class="stat"><div class="val">3</div><div class="lbl">作品</div></div>
    </div>

    <!-- 旅游转化评分图表 -->
    <div class="chart-wrap">
      <h3>旅游转化综合评分</h3>
      <canvas id="tourChart" height="130"></canvas>
    </div>

    <!-- 地点信息面板 -->
    <div class="info-panel">
      <h3>点击地图查看详情</h3>
      <div id="site-info">
        <p style="margin-top:.5rem;line-height:1.6">
          本 Demo 展示三部动画作品的<strong style="color:var(--text)">圣地巡礼点</strong>（共 90 个）及同城随机<strong style="color:var(--text)">对照点</strong>（共 270 个）的地理分布。
          研究核心问题：普通城市空间通过媒体再现、粉丝认同与旅游整合，何种空间条件更易成为动漫圣地？
        </p>
      </div>
    </div>
  </aside>
</main>

const TOUR_DATA = [
  {anime_id:27364,  title:'冰菓',      year:2012, rating:8.2, score:7.85},
  {anime_id:10440,  title:'未闻花名',  year:2011, rating:7.5, score:7.83},

];

// ── 渲染圣地点位 ──────────────────────────────────────────
const layerGroup = L.layerGroup().addTo(map);

SITES.features.forEach(f => {
  const p = f.properties;
  const [lon, lat] = f.geometry.coordinates;
  const color = ANIME_COLOR[p.anime_id] || '#888';
  const m = makeMarker(lat, lon, color, 7);
  const ptZh = PLACE_TYPE_ZH[p.place_type] || '其他';
  m.bindPopup(
    `<b>${p.name}</b>` +
    `<small>【${ANIME_NAME[p.anime_id]}】${p.city} · ${p.prefecture}</small><br>` +
    `<small>类型：${ptZh}${p.sensitive ? '　⚠️ 敏感地点' : ''}</small>`
  );
  m.on('click', () => showInfo(p, ptZh));
  m.addTo(layerGroup);
});

function showInfo(p, ptZh){
  const cls = PLACE_TYPE_CLASS[p.place_type] || 'pt-other';
  document.getElementById('site-info').innerHTML = `
    <div class="info-card">
      <div class="card-title">${p.name}</div>
      <table>
        <tr><td>作品</td><td><span class="tag">${ANIME_NAME[p.anime_id]}</span></td></tr>
        <tr><td>地点类型</td><td><span class="tag ${cls}">${ptZh}</span></td></tr>
        <tr><td>城市</td><td>${p.city}・${p.prefecture}</td></tr>
        <tr><td>编号</td><td>${p.id}</td></tr>
        ${p.sensitive ? '<tr><td></td><td><span class="tag" style="background:#ef444422;color:#ef4444">⚠ 敏感地点</span></td></tr>' : ''}
      </table>
    </div>`;
}

// ── Chart.js 旅游转化评分 ─────────────────────────────────
const ctx = document.getElementById('tourChart').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: TOUR_DATA.map(d => d.title),
    datasets: [
      {
        label: '旅游转化评分',
        data: TOUR_DATA.map(d => d.score),
        backgroundColor: [
          'rgba(249,115,22,.75)',
          'rgba(34,211,238,.75)',
          'rgba(163,230,53,.75)',
        ],
        borderRadius: 4,
        borderSkipped: false,

        borderRadius: 4,
        borderSkipped: false,
      }
    ]
  },

    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        labels:{color:'#9ca3af', font:{size:10}},
      },
      tooltip:{
        callbacks:{
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}`
        }
      }

    scales: {
      x: {ticks:{color:'#9ca3af',font:{size:10}}, grid:{color:'#1f2435'}},
      y: {
        ticks:{color:'#9ca3af',font:{size:10}},

      }
    }
